<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>

    <title>Frontend Mentor | Time tracking dashboard</title>
  </head>
  <body>
    <main class="activity-tracker">
      <section class="activity-tracker__menu">
        <div class="activity-tracker__owner">
          <img
            class="activity-tracker__owner-img"
            src="./images/image-jeremy.png"
            alt="Jeremy profile picture"
          />
          <div class="activity-tracker__owner-container">
            <p class="activity-tracker__owner-for">Report for</p>
            <h1 class="activity-tracker__owner-name">Jeremy Robson</h1>
          </div>
        </div>
        <div class="activity-tracker__options">
          <button class="activity-tracker__option-btn" data-option="daily">
            Daily
          </button>
          <button class="activity-tracker__option-btn" data-option="weekly">
            Weekly
          </button>
          <button class="activity-tracker__option-btn" data-option="monthly">
            Monthly
          </button>
        </div>
      </section>

      <section class="card-activity">
        <div class="card-activity__bg-img work">
          <img src="./images/icon-work.svg" alt="" />
        </div>
        <div class="card-activity__info">
          <header class="card-activity__header">
            <h2 class="card-activity__type">Work</h2>
            <div class="card-activity__menu-options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="card-activity__timeframes">
            <h3 class="card-activity__current-timeframe">32hrs</h3>

            <div class="card-activity__previous-timeframe">
              <p class="previous-timeframe">Last Week</p>
              <p>-</p>
              <p class="previous-time">36hrs</p>
            </div>
          </div>
        </div>
      </section>

      <section class="card-activity">
        <div class="card-activity__bg-img study">
          <img src="./images/icon-work.svg" alt="" />
        </div>
        <div class="card-activity__info">
          <header class="card-activity__header">
            <h2 class="card-activity__type">Work</h2>
            <div class="card-activity__menu-options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="card-activity__timeframes">
            <h3 class="card-activity__current-timeframe">32hrs</h3>

            <div class="card-activity__previous-timeframe">
              <p class="previous-timeframe">Last Week</p>
              <p>-</p>
              <p class="previous-time">36hrs</p>
            </div>
          </div>
        </div>
      </section>

      <section class="card-activity">
        <div class="card-activity__bg-img self-care">
          <img src="./images/icon-work.svg" alt="" />
        </div>
        <div class="card-activity__info">
          <header class="card-activity__header">
            <h2 class="card-activity__type">Work</h2>
            <div class="card-activity__menu-options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="card-activity__timeframes">
            <h3 class="card-activity__current-timeframe">32hrs</h3>

            <div class="card-activity__previous-timeframe">
              <p class="previous-timeframe">Last Week</p>
              <p>-</p>
              <p class="previous-time">36hrs</p>
            </div>
          </div>
        </div>
      </section>

      <section class="card-activity">
        <div class="card-activity__bg-img play">
          <img src="./images/icon-work.svg" alt="" />
        </div>
        <div class="card-activity__info">
          <header class="card-activity__header">
            <h2 class="card-activity__type">Work</h2>
            <div class="card-activity__menu-options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="card-activity__timeframes">
            <h3 class="card-activity__current-timeframe">32hrs</h3>

            <div class="card-activity__previous-timeframe">
              <p class="previous-timeframe">Last Week</p>
              <p>-</p>
              <p class="previous-time">36hrs</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
