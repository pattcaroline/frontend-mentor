<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>

    <title>Frontend Mentor | Time tracking dashboard</title>
  </head>
  <body>
    <main class="container">
      <div class="user-container">
        <div class="user">
          <picture>
            <img
              class="profile-picture"
              src="./images/image-jeremy.png"
              alt="Jeremy profile picture"
            />
          </picture>
          <p>Report for</p>
          <h1>Jeremy Robson</h1>
        </div>
        <div class="time-frequency">
          <p>Daily</p>
          <p>Weekly</p>
          <p>Monthly</p>
        </div>
      </div>

      <div class="work">
        <div class="bg-img">
          <img src="./images/icon-work.svg" alt="" />
        </div>
        <h2>Work</h2>
        <img src="./images/icon-ellipsis.svg" alt="" />
        <h1 class="hours">32hrs</h1>
        <p>Last Week - 36hrs</p>
      </div>

      <div class="play">
        <div class="bg-img">
          <img src="./images/icon-play.svg" alt="" />
        </div>
        <h2>Play</h2>
        <img src="./images/icon-ellipsis.svg" alt="" />
        <h1 class="hours">10hrs</h1>
        <p>Last Week - 8hrs</p>
      </div>

      <div class="study">
        <div class="bg-img">
          <img src="./images/icon-study.svg" alt="" />
        </div>
        <h2>Study</h2>
        <img src="./images/icon-ellipsis.svg" alt="" />
        <h1 class="hours">4hrs</h1>
        <p>Last Week - 7hrs</p>
      </div>

      <div class="exercise">
        <div class="bg-img">
          <img src="./images/icon-exercise.svg" alt="" />
        </div>
        <h2>Exercise</h2>
        <img src="./images/icon-ellipsis.svg" alt="" />
        <h1 class="hours">4hrs</h1>
        <p>Last Week - 5hrs</p>
      </div>

      <div class="social">
        <div class="bg-img">
          <img src="./images/icon-social.svg" alt="" />
        </div>
        <h2>Social</h2>
        <img src="./images/icon-ellipsis.svg" alt="" />
        <h1 class="hours">5hrs</h1>
        <p>Last Week - 10hrs</p>
      </div>

      <div class="self-care">
        <div class="bg-img">
          <img src="./images/icon-self-care.svg" alt="" />
        </div>
        <h2>Self Care</h2>
        <img src="./images/icon-ellipsis.svg" alt="" />
        <h1 class="hours">2hrs</h1>
        <p>Last Week - 2hrs</p>
      </div>
    </main>
  </body>
</html>
