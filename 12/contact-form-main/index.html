<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Contact form</title>
  </head>
  <body>
    <main class="contact">
      <h1>Contact Us</h1>
      <form novalidate>
        <div class="form-group">
          <label for="fname">First Name</label>
          <input type="text" id="fname" name="first_name" required />
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="lname">Last Name</label>
          <input type="text" id="lname" name="last_name" required />
          <span class="error-message"></span>
        </div>

        <div class="form-group span-all">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required />
          <span class="error-message"></span>
        </div>

        <fieldset class="span-all">
          <legend>Query Type</legend>
          <div class="form-group">
            <input
              type="radio"
              id="general"
              name="query"
              value="general_enquiry"
              required
            />
            <label for="general">General Enquiry</label>
          </div>
          <div class="form-group">
            <input
              type="radio"
              id="support"
              name="query"
              value="support"
              required
            />
            <label for="support">Support Request</label>
          </div>
          <span class="error-message"></span>
        </fieldset>

        <div class="form-group span-all">
          <label for="message">Message</label>
          <textarea name="message" id="message" required></textarea>
          <span class="error-message"></span>
        </div>

        <div class="form-group span-all">
          <input type="checkbox" name="consent" id="consent" required />
          <label for="consent">I consent to being contacted by the team</label>
          <span class="error-message"></span>
        </div>
        <button class="span-all">Submit</button>
      </form>
    </main>

    <!-- 
    
    This field is required 
    This field is required 
    Please enter a valid email address/ This field is required 
    Please select a query type 
    This field is required 
    To submit this form, please consent to being contacted 
    
    //SUCCESS MESSAGE
    Submit Message Sent! Thanks for completing
    the form. We'll be in touch soon! -->
  </body>
</html>
