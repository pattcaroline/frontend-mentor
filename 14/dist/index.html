<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/frontend-mentor/14/dist/assets/favicon-32x32-DQjEQYWa.png"
    />

    <title>Frontend Mentor | Tip calculator app</title>
    <link rel="stylesheet" crossorigin href="/frontend-mentor/14/dist/assets/index-BJGQyOhh.css">
  </head>
  <body
    class="bg-grey-200 font-mono md:min-h-screen flex flex-col justify-center items-center text-base/6"
  >
    <!-- LOGO -->
    <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='87'%20height='54'%3e%3cpath%20fill='%233D6666'%20d='M6.72%2017.472c.944%200%201.792-.12%202.544-.36s1.392-.584%201.92-1.032a4.476%204.476%200%20001.212-1.62c.28-.632.42-1.34.42-2.124v-.288c0-1.472-.464-2.584-1.392-3.336-.928-.752-2.272-1.288-4.032-1.608a14.615%2014.615%200%2001-1.74-.408c-.456-.144-.824-.308-1.104-.492-.28-.184-.476-.392-.588-.624a1.771%201.771%200%2001-.168-.78c0-.56.232-1.004.696-1.332.464-.328%201.096-.492%201.896-.492.944%200%201.676.248%202.196.744.52.496.78%201.08.78%201.752v.576h3.168v-.864a5%205%200%2000-.396-1.968%204.762%204.762%200%2000-1.176-1.656C10.436%201.08%209.792.7%209.024.42%208.256.14%207.376%200%206.384%200c-.88%200-1.676.12-2.388.36s-1.32.576-1.824%201.008c-.504.432-.896.94-1.176%201.524-.28.584-.42%201.22-.42%201.908v.144c0%20.832.144%201.536.432%202.112a3.978%203.978%200%20001.212%201.44c.52.384%201.132.692%201.836.924.704.232%201.48.42%202.328.564.64.112%201.168.248%201.584.408.416.16.744.34.984.54s.408.424.504.672c.096.248.144.508.144.78%200%20.576-.232%201.072-.696%201.488-.464.416-1.176.624-2.136.624-1.232%200-2.14-.3-2.724-.9-.584-.6-.876-1.404-.876-2.412v-.576H0v.72c0%20.88.144%201.692.432%202.436a5.47%205.47%200%20001.272%201.944c.56.552%201.26.984%202.1%201.296.84.312%201.812.468%202.916.468zm22-.336V10.8h3.408c.864%200%201.616-.144%202.256-.432a4.707%204.707%200%20001.596-1.14%204.833%204.833%200%2000.96-1.608c.216-.6.324-1.212.324-1.836v-.576c0-.608-.108-1.204-.324-1.788a4.625%204.625%200%2000-.96-1.56A4.737%204.737%200%200034.384.756c-.64-.28-1.392-.42-2.256-.42h-6.576v16.8h3.168zm3.096-9.36H28.72V3.36h3.096c.704%200%201.26.192%201.668.576.408.384.612.88.612%201.488v.288c0%20.608-.204%201.104-.612%201.488-.408.384-.964.576-1.668.576zm29.464%209.36v-3.024h-7.632V.336H50.48v16.8h10.8zm24.88%200v-3.024h-4.032V3.36h4.032V.336H74.928V3.36h4.032v10.752h-4.032v3.024H86.16zm-78.096%2036V39.36h4.464v-3.024H.432v3.024h4.464v13.776h3.168zm24.688%200V39.36h4.464v-3.024H25.12v3.024h4.464v13.776h3.168zm28.624%200v-3.024h-7.728v-3.888H60.8V43.2h-7.152v-3.84h7.44v-3.024H50.48v16.8h10.896zm16.744%200V46.8h3.648c.464%200%20.796.12.996.36.2.24.3.552.3.936v5.04h3.168v-5.808c0-.56-.164-1.024-.492-1.392-.328-.368-.772-.584-1.332-.648v-.432c.768-.32%201.336-.78%201.704-1.38a3.63%203.63%200%2000.552-1.932v-.576c0-.64-.116-1.24-.348-1.8a4.332%204.332%200%2000-1.008-1.476c-.44-.424-.988-.756-1.644-.996-.656-.24-1.416-.36-2.28-.36h-6.432v16.8h3.168zm3.024-9.36H78.12V39.36h3.024c.768%200%201.352.204%201.752.612.4.408.6.892.6%201.452v.288c0%20.656-.2%201.164-.6%201.524-.4.36-.984.54-1.752.54z'/%3e%3c/svg%3e" alt="" class="p-8 lg:p-16" />

    <!-- MAIN CONTAINER -->
    <main
      class="bg-white grid grid-cols-1 w-full py-8 px-6 rounded-t-3xl md:rounded-3xl md:py-12 md:px-20 md:w-xl lg:grid-cols-2 lg:w-4xl lg:p-8 lg:gap-12"
    >
      <!-- BILL SECTION -->
      <section
        class="flex flex-col gap-8 mb-8 lg:gap-10 lg:mb-0 lg:justify-between"
      >
        <div id="bill-group">
          <!-- Header row for both header and error message hidden -->
          <div class="flex items-center justify-between mb-2">
            <label for="bill" class="font-bold text-grey-500 inline-block"
              >Bill</label
            >
            <span
              id="bill-error"
              class="hidden text-base/6 font-bold text-orange-400"
              >Can't be zero
            </span>
          </div>
          <div
            id="bill-input-container"
            class="flex flex-row justify-between items-center bg-grey-50 text-grey-300 rounded-lg px-4 py-2"
          >
            <img
              src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='11'%20height='17'%3e%3cpath%20fill='%239EBBBD'%20d='M6.016%2016.328v-1.464c1.232-.08%202.22-.444%202.964-1.092.744-.648%201.116-1.508%201.116-2.58v-.144c0-.992-.348-1.772-1.044-2.34-.696-.568-1.708-.932-3.036-1.092V4.184c.56.144%201.012.4%201.356.768.344.368.516.816.516%201.344v.288h1.824v-.432c0-.448-.088-.876-.264-1.284a3.783%203.783%200%2000-.744-1.116A4.251%204.251%200%20007.54%202.9a5.324%205.324%200%2000-1.524-.492V.872H4.288V2.36a5.532%205.532%200%2000-1.416.324c-.448.168-.84.392-1.176.672-.336.28-.604.616-.804%201.008-.2.392-.3.844-.3%201.356v.144c0%20.96.316%201.708.948%202.244.632.536%201.548.884%202.748%201.044v3.912c-.704-.16-1.248-.472-1.632-.936-.384-.464-.576-1.08-.576-1.848v-.288H.256v.576c0%20.464.08.924.24%201.38.16.456.404.88.732%201.272.328.392.744.728%201.248%201.008s1.108.476%201.812.588v1.512h1.728zM4.288%207.424c-.688-.128-1.164-.332-1.428-.612-.264-.28-.396-.644-.396-1.092%200-.464.176-.832.528-1.104.352-.272.784-.448%201.296-.528v3.336zm1.728%205.712V9.344c.768.128%201.328.328%201.68.6.352.272.528.688.528%201.248%200%20.544-.196.984-.588%201.32-.392.336-.932.544-1.62.624z'/%3e%3c/svg%3e"
              alt="icon-dollar"
              class="h-4 w-auto object-contain"
            />

            <input
              id="bill-input"
              type="number"
              placeholder="0"
              class="placeholder:text-grey-300 font-bold text-2xl/9 text-end w-full bg-transparent text-green-900 focus:outline-none [appearance:textfield]"
            />
          </div>
        </div>

        <!-- Tip Percentage -->
        <div>
          <label class="font-bold text-grey-500 inline-block mb-2"
            >Select Tip %</label
          >
          <div
            id="select-tips"
            class="grid grid-cols-2 gap-4 font-bold text-2xl/9 md:grid-cols-3"
          >
            <button
              data-tip="5"
              class="bg-green-900 text-white rounded-md px-4 py-2 hover:bg-green-400 hover:text-green-900 transition-colors duration-200 cursor-pointer"
            >
              5%
            </button>
            <button
              data-tip="10"
              class="bg-green-900 text-white rounded-md px-4 py-2 hover:bg-green-400 hover:text-green-900 transition-colors duration-200 cursor-pointer"
            >
              10%
            </button>
            <button
              data-tip="15"
              class="bg-green-900 text-white rounded-md px-4 py-2 hover:bg-green-400 hover:text-green-900 transition-colors duration-200 cursor-pointer"
            >
              15%
            </button>
            <button
              data-tip="25"
              class="bg-green-900 text-white rounded-md px-4 py-2 hover:bg-green-400 hover:text-green-900 transition-colors duration-200 cursor-pointer"
            >
              25%
            </button>
            <button
              data-tip="50"
              class="bg-green-900 text-white rounded-md px-4 py-2 hover:bg-green-400 hover:text-green-900 transition-colors duration-200 cursor-pointer"
            >
              50%
            </button>
            <input
              type="number"
              id="custom-tip-input"
              placeholder="Custom"
              class="bg-grey-50 text-center font-bold text-green-900 placeholder:text-grey-500 text-2xl/9 w-full rounded-md px-4 py-2 focus:outline-none focus:ring-2"
            />
          </div>
        </div>

        <!-- Number of People -->
        <div id="people-group">
          <!-- Header row for both header and error message hidden -->
          <div class="flex items-center justify-between mb-2">
            <label for="numPeople" class="font-bold text-grey-500 inline-block"
              >Number of People</label
            >
            <span
              id="people-error"
              class="hidden text-base/6 font-bold text-orange-400"
              >Can't be zero
            </span>
          </div>
          <div
            id="people-input-container"
            class="flex flex-row justify-between items-center bg-grey-50 text-grey-300 rounded-lg px-4 py-2"
          >
            <img
              src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='13'%20height='16'%3e%3cpath%20fill='%239EBBBD'%20d='M9.573%207.729c.406%200%20.784.07%201.126.209.342.14.639.33.881.569.232.227.438.503.614.82a5.1%205.1%200%2001.407.949c.097.312.178.654.242%201.016.062.359.105.699.126%201.011.02.307.031.624.031.945%200%20.836-.259%201.512-.768%202.01-.504.492-1.17.742-1.98.742H2.748c-.81%200-1.477-.25-1.98-.742C.259%2014.76%200%2014.084%200%2013.248c0-.322.01-.64.032-.945.02-.312.063-.652.126-1.01.063-.363.144-.705.242-1.017.1-.323.238-.643.407-.948.176-.318.382-.594.613-.821.243-.238.54-.43.882-.57.342-.138.72-.208%201.125-.208.16%200%20.313.067.61.265.183.123.397.264.636.421.204.134.48.259.822.372.333.11.671.167%201.005.167a3.19%203.19%200%20001.006-.167c.341-.113.618-.238.822-.372l.636-.42c.296-.2.45-.266.61-.266zM6.598%200C7.63%200%208.522.38%209.252%201.129s1.1%201.666%201.1%202.724c0%201.06-.37%201.976-1.1%202.725-.73.75-1.623%201.13-2.654%201.13-1.03%200-1.924-.38-2.653-1.13-.73-.749-1.1-1.666-1.1-2.725%200-1.058.37-1.975%201.1-2.724C4.675.379%205.567%200%206.598%200z'/%3e%3c/svg%3e"
              alt="icon-person"
              class="h-auto object-cover"
            />

            <input
              type="number"
              name="numPeople"
              id="numPeople"
              placeholder="0"
              class="placeholder:text-grey-300 font-bold text-2xl/9 text-end w-full bg-transparent text-green-900 focus:outline-none"
            />
          </div>
        </div>
      </section>

      <!-------------------------- TIP SECTION ----------------------------->
      <section class="flex flex-col bg-green-900 rounded-2xl p-6">
        <div class="flex flex-col gap-6 mb-8 lg:mb-32">
          <!-- Tip Amount Row -->
          <div class="flex flex-row justify-between items-center">
            <div>
              <h2 class="font-bold text-white text-base/6">Tip Amount</h2>
              <span class="font-bold text-grey-400 text-sm/5">/ person</span>
            </div>
            <span
              id="tip-amount"
              class="font-bold text-green-400 text-[32px] md:text-5xl/18"
            ></span>
          </div>

          <!-- Total Amount Row -->
          <div class="flex flex-row justify-between items-center">
            <div>
              <h2 class="font-bold text-white text-base/6">Total</h2>
              <span class="font-bold text-grey-400 text-sm/5">/ person</span>
            </div>
            <span
              id="total-amount"
              class="font-bold text-green-400 text-[32px] md:text-5xl/18"
            ></span>
          </div>
        </div>

        <!-- Reset Button  -->
        <button
          id="reset-btn"
          class="bg-green-400 text-green-900 font-bold text-[20px]/[30px] uppercase mt-auto rounded-md px-8 py-2 md:px-10 md:p hover:bg-green-200 transition-colors cursor-pointer"
        >
          Reset
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
