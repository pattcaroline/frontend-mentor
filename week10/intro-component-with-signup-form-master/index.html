<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Intro component with sign up form</title>
  </head>
  <body>
    <main class="main-container">
      <h1 class="main-container__title">Learn to code by watching others</h1>
      <p class="main-container__paragraph">
        See how experienced developers solve problems in real-time. Watching
        scripted tutorials is great, but understanding how developers think is
        invaluable.
      </p>
    </main>
    <div class="form-container">
      <p class="form-container__banner">
        <span>Try it free 7 days</span> then $20/mo. thereafter
      </p>
      <form class="form-fields" id="form" novalidate>
        <div class="form-field">
          <label class="form-field__label" for="first-name">First Name</label>
          <input
            class="form-field__input"
            type="text"
            name="first-name"
            id="first-name"
            placeholder="First Name"
          />
          <span
            class="form-field__error"
            aria-live="polite"
            id="first-name-error"
          ></span>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="last-name">Last Name</label>
          <input
            class="form-field__input"
            type="text"
            name="last-name"
            id="last-name"
            placeholder="Last Name"
          />
          <span
            class="form-field__error"
            aria-live="polite"
            id="last-name-error"
          ></span>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="email">Email Address</label>
          <input
            class="form-field__input"
            type="email"
            name="email"
            id="email"
            placeholder="Email Address"
          />
          <span
            class="form-field__error"
            aria-live="polite"
            id="email-error"
          ></span>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="password">Password</label>
          <input
            class="form-field__input"
            type="password"
            name="password"
            id="password"
            placeholder="Password"
          />
          <span
            class="form-field__error"
            aria-live="polite"
            id="password-error"
          ></span>
        </div>

        <div class="form-submit">
          <button class="form-submit__button">Claim your free trial</button>

          <small class="form-submit__terms"
            >By clicking the button, you are agreeing to our
            <a href="#" class="form-submit__terms-link"
              >Terms and Services</a
            ></small
          >
        </div>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
